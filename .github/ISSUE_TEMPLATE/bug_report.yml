name: Bug report
description: Report a reproducible bug
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Android/iOS/Web + app version
